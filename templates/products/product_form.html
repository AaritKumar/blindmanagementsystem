<div class="create-section">
    <div class="create-tabs">
        <button class="create-tab-link active" data-tab="custom">Custom</button>
        <button class="create-tab-link" data-tab="template">From Template</button>
    </div>

    <div id="custom" class="create-tab-content active">
        <h3>Create a New Audio Label</h3>
        <form method="post" action="{% url 'product_create' %}" id="product-creation-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_name">Name</label>
                <input type="text" name="name" id="id_name" required maxlength="200">
                <small class="char-counter">0 / 200</small>
            </div>
            <div class="form-group">
                <label for="id_text_description">Description</label>
                <textarea name="text_description" id="id_text_description" required maxlength="1000"></textarea>
                <small class="char-counter">0 / 1000</small>
            </div>
            <div class="form-actions">
                <button type="button" id="custom-preview-btn" class="btn btn-secondary">Preview Audio</button>
                <button type="submit" class="btn">Create Product</button>
            </div>
        </form>
    </div>

    <div id="template" class="create-tab-content">
        <h3>Create from a Template</h3>
        <div class="template-controls">
            <input type="text" id="template-search" placeholder="Search templates...">
            <button id="show-template-modal-btn" class="btn btn-secondary">+</button>
        </div>
        <ul id="template-list">
            {% for template in templates %}
                <li><a href="{% url 'use_template' template.pk %}">{{ template.name }}</a></li>
            {% endfor %}
        </ul>
    </div>
</div>
